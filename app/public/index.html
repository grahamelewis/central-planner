<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Central Planner</title>
<script>
// phones get the phone app (override with ?desktop)
if (Math.min(screen.width, screen.height) < 700 && !location.search.includes('desktop')
    && /Mobi|iPhone|Android/.test(navigator.userAgent)) {
  location.replace('/m/');
}
</script>
<link rel="stylesheet" href="style.css">
<!-- console rendering: markdown + sanitizer + LaTeX (graceful fallback to plain text offline).
     SRI-pinned: a compromised CDN cannot inject script into the dashboard. -->

  integrity="sha384-nB0miv6/jRmo5UMMR1wu3Gz6NLsoTkbqJghGIsx//Rlm+ZU03BU6SQNC66uf4l5+" crossorigin="anonymous">
<script defer src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"
  integrity="sha384-/TQbtLCAerC3jgaim+N78RZSDYV7ryeoBCVqTuzRrFec2akfBkHS7ACQ3PQhvMVi" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"
  integrity="sha384-+VfUPEb0PdtChMwmBcBmykRMDd+v6D/oFmB3rZM/puCMDYcIvF968OimRh4KQY9a" crossorigin="anonymous"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"
  integrity="sha384-7zkQWkzuo3B5mTepMUcHkMB5jZaolc2xDwL6VFqjFALcbeS9Ggm/Yr2r3Dy4lfFg" crossorigin="anonymous"></script>

  integrity="sha384-43gviWU0YVjaDtb/GhzOouOXtZMP/7XUzwPTstBeZFe/+rCMvRwr4yROQP43s0Xk" crossorigin="anonymous"></script>
</head>
<body>

<nav id="nav">
  <span class="brand profile" id="profileBtn" title="profile"><span id="brandName">Central Planner</span> <span class="pcaret">▾</span></span>
  <div class="tab on" data-v="ov">⌂ Overview</div>
  <span id="navProjects" style="display:contents"></span>
  <div class="right">
    <button class="addBtn" id="openModal" style="padding:7px 16px;font-size:11.5px;">＋ ADD TASK</button>
    <div class="tab" id="gitBtn" title="GitHub — status, pull, commit & push, delegate">
      <svg class="ghIcon" viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27s1.36.09 2 .27c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
      git</div>
    <div class="tab" data-v="cats">⊞ categories</div>
    <span class="chip" id="navWeek">wk —</span>
  </div>
</nav>

<!-- ════════════════ OVERVIEW ════════════════ -->
<div class="view show" id="v-ov">
  <div id="ov"><div class="frame">
    <div class="bento" id="bento"></div>
  </div></div>
</div>

<!-- ════════════════ WORKBENCH VIEWS (one per project, created by app.js) ════════════════ -->
<div id="projectViews"></div>

<!-- ════════════════ CATEGORIES ════════════════ -->
<div class="view" id="v-cats">
  <div class="frame" id="catsFrame"></div>
</div>

<!-- ════════════════ MANAGE PROJECTS (profile menu) ════════════════ -->
<div class="view" id="v-manage">
  <div class="frame" id="manageFrame"></div>
</div>

<!-- ════════════════ ABOUT YOU (profile menu) ════════════════ -->
<div class="view" id="v-about">
  <div class="frame" id="aboutFrame"></div>
</div>

<!-- ════════════════ ADD TASK MODAL ════════════════ -->
<div id="gitBack"><div id="gitPanel"></div></div>

<div id="modalBack">
  <div id="modal">
    <div class="formSide" id="modalForm"></div>
    <div class="jsonSide">
      <div class="jh"><span>the record being written</span><span id="jhFile"></span></div>
      <pre id="mJson"></pre>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module" src="app.js"></script>
</body>
</html>
